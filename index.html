<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>Sanctum Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d0d0d;color:#fff;font-family:Barlow,sans-serif;overscroll-behavior:none}
.bc{font-family:'Barlow Condensed',sans-serif}
input[type=number]{-moz-appearance:textfield;background:#111;border:1px solid #333;border-radius:8px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;outline:none;padding:10px;text-align:center;width:100%}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=password],input[type=text]{background:#111;border:1px solid #333;border-radius:8px;color:#fff;font-family:Barlow,sans-serif;font-size:15px;outline:none;padding:12px;width:100%}
textarea{background:#111;border:1px solid #222;border-radius:6px;color:#888;font-family:Barlow,sans-serif;font-size:13px;outline:none;padding:8px;resize:none;width:100%}
button{cursor:pointer}
::-webkit-scrollbar{display:none}
.page{display:none;min-height:100vh;padding-bottom:80px}
.page.on{display:block}
.sticky{position:sticky;top:0;z-index:20;background:#0d0d0d}
.home-hdr{padding:24px 16px 14px;border-bottom:1px solid #161616;display:flex;justify-content:space-between;align-items:center}
.app-name{font-size:32px;font-weight:900;letter-spacing:5px}
.app-sub{font-size:10px;color:#444;letter-spacing:3px;margin-top:2px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0}
.day-card{border-radius:10px;padding:18px;margin:0 16px 12px;cursor:pointer;border:1px solid;border-left-width:4px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.card-label{font-size:11px;letter-spacing:3px;font-weight:700;margin-bottom:3px}
.card-name{font-size:20px;font-weight:900;line-height:1.2}
.card-num{font-size:52px;font-weight:900;line-height:1}
.card-pills{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.pill{font-size:11px;background:#181818;color:#555;padding:3px 8px;border-radius:4px}
.card-meta{margin-top:8px;font-size:11px;color:#333;display:flex;gap:12px}
.card-vol{font-size:11px;color:#555;margin-top:4px}
.wk-hdr{padding:12px 16px;border-bottom-width:1px;border-bottom-style:solid}
.wk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wk-label{font-size:10px;letter-spacing:3px;font-weight:700}
.wk-title{font-size:15px;font-weight:900}
.prog-bar{height:3px;background:#1a1a1a;border-radius:2px}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.pills-nav{overflow-x:auto;padding:10px 16px;display:flex;gap:8px;white-space:nowrap;border-bottom:1px solid #161616}
.ex-pill{border-radius:4px;border-width:1px;border-style:solid;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1px;padding:6px 10px;white-space:nowrap;flex-shrink:0}
.wk-body{padding:14px 16px 0}
.ex-muscle{font-size:10px;letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.ex-name{font-size:28px;font-weight:900;line-height:1.1;margin-bottom:4px}
.ex-cue{font-size:12px;color:#555;margin-bottom:4px;font-style:italic}
.overload{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:4px;margin-bottom:12px}
.photo-wrap{margin-bottom:14px}
.photo-full{width:100%;height:120px;object-fit:cover;border-radius:8px}
.photo-refs{display:flex;gap:6px;margin-bottom:6px}
.photo-ref-img{flex:1;height:90px;object-fit:cover;border-radius:6px;border:1px solid #222}
.ref-label{font-size:10px;color:#444;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
.btn-photo-add{width:100%;padding:8px;background:#0f0f0f;border:1px dashed #222;border-radius:6px;color:#333;font-size:12px}
.prev-box{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:8px;padding:10px 12px;margin-bottom:14px}
.prev-lbl{font-size:10px;color:#333;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.prev-sets{display:flex;gap:6px;flex-wrap:wrap}
.prev-set{background:#181818;border-radius:5px;padding:5px 10px;text-align:center}
.prev-w{font-size:16px;font-weight:700;color:#666}
.prev-r{font-size:10px;color:#333}
.sets-hdr{font-size:10px;color:#333;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;display:flex;justify-content:space-between}
.set-row{display:flex;align-items:center;justify-content:space-between;border-radius:8px;padding:10px 12px;margin-bottom:7px;border-width:1px;border-style:solid}
.set-left{display:flex;align-items:center;gap:10px}
.set-num{font-size:11px;font-weight:700;letter-spacing:1px}
.set-w{font-size:22px;font-weight:700}
.set-kg{font-size:11px;color:#555}
.set-x{font-size:13px;color:#555}
.set-del{background:none;border:none;color:#2a2a2a;font-size:16px;padding:4px 6px}
.input-card{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:10px;padding:14px;margin-top:6px}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-group{flex:1}
.input-lbl{font-size:10px;color:#444;letter-spacing:1px;margin-bottom:5px}
.wctrl{display:flex;align-items:center;border:1px solid #333;border-radius:8px;overflow:hidden}
.wbtn{background:#1a1a1a;border:none;color:#fff;font-size:22px;font-weight:700;padding:8px 14px}
.winput{background:#111;border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;flex:1;outline:none;text-align:center;padding:6px 2px;min-width:0}
.rep-row{display:flex;gap:5px;margin-bottom:10px}
.rep-btn{flex:1;background:#111;border:1px solid #222;border-radius:6px;color:#555;font-size:13px;font-weight:600;padding:7px 2px}
.note-area{margin-bottom:10px}
.log-btn{width:100%;padding:13px;border:none;border-radius:8px;color:#000;font-size:17px;font-weight:900;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #161616;padding:10px 16px;display:flex;gap:8px}
.btn-back{flex:1;padding:12px;background:#111;border:1px solid #222;color:#555;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700}
.btn-next{flex:2;padding:12px;border:none;color:#000;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900}
.timer-bar{position:fixed;top:0;left:0;height:4px;z-index:100;transition:width .1s linear}
.timer-banner{position:fixed;top:4px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;z-index:99;font-size:13px;font-weight:600}
.timer-skip{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.3);border-radius:4px;color:#fff;font-size:11px;padding:3px 10px}
.timer-secs{font-size:20px;font-weight:900}
.complete-wrap{padding:32px 16px}
.complete-title{font-size:48px;font-weight:900;text-align:center;margin-bottom:4px}
.complete-sub{font-size:13px;color:#555;text-align:center;margin-bottom:24px}
.complete-vol{font-size:16px;font-weight:700;text-align:center;margin-bottom:24px;padding:12px;background:#111;border-radius:8px}
.ex-card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:8px;padding:12px;margin-bottom:8px}
.ex-card-name{font-size:13px;font-weight:600;color:#888;margin-bottom:8px}
.ex-card-sets{display:flex;gap:6px;flex-wrap:wrap}
.set-chip{background:#181818;border-radius:5px;padding:5px 10px;text-align:center}
.btn-home{width:100%;margin-top:16px;padding:15px;border:none;color:#000;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;letter-spacing:2px}
.hist-hdr{padding:16px;border-bottom:1px solid #161616;display:flex;justify-content:space-between;align-items:center}
.hist-title{font-size:24px;font-weight:900;letter-spacing:3px}
.btn-hist-home{background:#222;border:1px solid #444;color:#fff;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px}
.hist-list{padding:16px}
.hist-sess{border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid;border-left-width:3px;border-left-style:solid}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.hist-ex{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.hist-ex-name{color:#444}
.hist-ex-stat{font-weight:700;color:#666}
.hist-vol{font-size:11px;color:#555;margin-top:6px}
/* Setup screen */
.setup-wrap{padding:40px 24px;max-width:400px;margin:0 auto}
.setup-title{font-size:36px;font-weight:900;letter-spacing:4px;margin-bottom:6px}
.setup-sub{font-size:13px;color:#555;margin-bottom:32px;line-height:1.6}
.setup-label{font-size:10px;color:#555;letter-spacing:2px;margin-bottom:8px;display:block}
.setup-btn{width:100%;padding:14px;border:none;border-radius:8px;color:#000;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;letter-spacing:2px;margin-top:16px;background:#FF4500}
.sync-status{font-size:11px;padding:8px 12px;border-radius:6px;margin-top:10px;text-align:center}
</style>
</head>
<body>
<div id="setup" class="page on"></div>
<div id="home" class="page"></div>
<div id="workout" class="page"></div>
<div id="complete" class="page"></div>
<div id="history" class="page"></div>
<div id="timerBar" style="display:none" class="timer-bar"></div>
<div id="timerBanner" style="display:none" class="timer-banner">
  <span id="timerMsg"></span>
  <span id="timerSecs" class="bc timer-secs"></span>
  <button class="timer-skip" onclick="killTimer()">SKIP</button>
</div>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(event)">

let history=[], ghToken=null, ghSha=null;

// ── GitHub Sync ──────────────────────────────────────────────
async function ghRead(){
  if(!ghToken) return false;
  try{
    const r=await fetch(GH_API,{headers:{'Authorization':`token ${ghToken}`,'Accept':'application/vnd.github.v3+json'}});
    if(r.status===404) return false; // file doesn't exist yet
    if(!r.ok) return false;
    const d=await r.json();
    ghSha=d.sha;
    const sessions=JSON.parse(atob(d.content.split('\n').join('')));
    history=sessions.sort((a,b)=>new Date(a.date)-new Date(b.date));
    return true;
  }catch(e){return false;}
}
async function ghWrite(){
  if(!ghToken) return;
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(history,null,2))));
    const body={message:`Session ${new Date().toISOString().split('T')[0]}`,content};
    if(ghSha) body.sha=ghSha;
    const r=await fetch(GH_API,{method:'PUT',headers:{'Authorization':`token ${ghToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){const d=await r.json();ghSha=d.content.sha;}
  }catch(e){}
}
function setSyncDot(state){
  const d=document.getElementById('syncDot');
  if(!d)return;
  d.style.background=state==='ok'?'#00CC44':state==='err'?'#FF4444':'#FF8800';
  d.title=state==='ok'?'Synced to GitHub':state==='err'?'Sync failed':'Syncing...';
}

function renderSetup(){
  document.getElementById('setup').innerHTML=`
    <div class="setup-wrap">
      <div class="bc setup-title">SANCTUM</div>
      <div class="app-sub" style="letter-spacing:3px;font-size:10px;color:#444;margin-bottom:6px">WORKOUT TRACKER</div>
      <p class="setup-sub">Enter your GitHub token to sync workouts across all devices. Your data is stored privately in your GitHub repo.</p>
      <label class="setup-label">GITHUB PERSONAL ACCESS TOKEN</label>
      <input type="password" id="tokenInput" placeholder="github_pat_..." autocomplete="off">
      <div id="syncMsg" class="sync-status" style="display:none"></div>
      <button class="setup-btn bc" onclick="connectGitHub()">CONNECT & SYNC</button>
      <button onclick="skipSetup()" style="width:100%;padding:12px;background:none;border:none;color:#333;font-size:13px;margin-top:12px">Use offline (no sync)</button>
    </div>`;
  show('setup');
}

async function connectGitHub(){
  const token=document.getElementById('tokenInput').value.trim();
  if(!token){showSyncMsg('Enter your token','#FF4444');return;}
  ghToken=token;
  showSyncMsg('Connecting...','#FF8800');
  const ok=await ghRead();
  if(ok){
    localStorage.setItem(TOKEN_KEY,token);
    localStorage.setItem('sanctum_sha',ghSha||'');
    renderHome();show('home');
  } else {
    // File doesn't exist yet — initialise with SEED
    history=[...SEED.map(s=>JSON.parse(JSON.stringify(s)))];
    showSyncMsg('Creating your data file...','#FF8800');
    await ghWrite();
    localStorage.setItem(TOKEN_KEY,token);
    renderHome();show('home');
  }
}
function showSyncMsg(msg,color){
  const el=document.getElementById('syncMsg');
  if(!el)return;
  el.style.display='block';
  el.style.background=color+'22';
  el.style.color=color;
  el.style.border=`1px solid ${color}44`;
  el.textContent=msg;
}
function skipSetup(){
  history=[...SEED.map(s=>JSON.parse(JSON.stringify(s)))];
  renderHome();show('home');
}

// ── Helpers ──────────────────────────────────────────────────
const P=d=>PLAN[String(d)];
const C=()=>P(activeDay).color;
const EX=()=>P(activeDay).exercises;
const CUR=()=>EX()[exIdx];
function lastSession(day){const s=history.filter(x=>x.day===day);return s.length?s[s.length-1]:null;}
function lastSets(day,idx){const l=lastSession(day);return l?.exercises[idx]?.sets||[];}
function lastWeight(day,idx){const s=lastSets(day,idx);return s.length?s[s.length-1].w:'';}
function vol(session){return session.exercises.reduce((t,ex)=>(ex.sets||[]).reduce((s,set)=>s+set.w*set.r,t),0);}
function fmt(n){if(n%1===0)return String(n);let s=n.toFixed(2);while(s[s.length-1]==='0')s=s.slice(0,-1);if(s[s.length-1]==='.')s=s.slice(0,-1);return s;}
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById(id).classList.add('on');window.scrollTo(0,0);}

    const totalSets=last?last.exercises.reduce((s,ex)=>s+(ex.sets||[]).length,0):0;

      <div class="card-meta">${meta}</div>

    </div>
    <div class="bottom-nav">
      <button class="btn-back bc" onclick="navBack()">${exIdx>0?'← BACK':'QUIT'}</button>
      <button class="btn-next bc" style="background:${c}" onclick="navNext()">${exIdx<ex.length-1?'NEXT →':'FINISH ✓'}</button>
    </div>`;
  updateRepBtns();
}
function goEx(i){exIdx=i;killTimer();renderWorkout();}
function navBack(){if(exIdx>0){exIdx--;killTimer();renderWorkout();}else{killTimer();renderHome();show('home');}}
function navNext(){if(exIdx<EX().length-1){exIdx++;killTimer();renderWorkout();}else{finishWorkout();}}
function adj(d){const el=document.getElementById('wIn');const v=parseFloat(el.value)||0;el.value=fmt(Math.max(0,Math.round((v+d)*100)/100));}
function adjR(d){const el=document.getElementById('rIn');const v=parseInt(el.value)||12;el.value=Math.max(1,v+d);updateRepBtns();}
function setR(r){document.getElementById('rIn').value=r;updateRepBtns();}
function updateRepBtns(){
  const c=C(),v=parseInt(document.getElementById('rIn')?.value)||12;
  [6,8,10,12,15].forEach(r=>{const b=document.getElementById('rb'+r);if(!b)return;if(r===v){b.style.color=c;b.style.borderColor=c;b.style.background=c+'22';}else{b.style.color='#555';b.style.borderColor='#222';b.style.background='';}});
}
function logSet(){
  const w=parseFloat(document.getElementById('wIn').value);if(!w||w<=0)return;
  const r=parseInt(document.getElementById('rIn').value)||12;
  const note=document.getElementById('noteIn').value.trim();
  if(!sets[exIdx])sets[exIdx]=[];
  sets[exIdx].push({w,r,note});
  document.getElementById('noteIn').value='';
  renderWorkout();startTimer();
}
function delSet(i){if(!sets[exIdx])return;sets[exIdx]=sets[exIdx].filter((_,j)=>j!==i);renderWorkout();}
function onPhoto(e){const file=e.target.files?.[0];if(!file)return;const rd=new FileReader();rd.onload=ev=>{photos[exIdx]=ev.target.result;renderWorkout();};rd.readAsDataURL(file);e.target.value='';}

// ── COMPLETE ─────────────────────────────────────────────────
async function finishWorkout(){
  killTimer();
  const d=P(activeDay),c=C();
  const session={id:Date.now(),day:activeDay,dayName:d.name,date:new Date().toISOString(),duration:Math.round((Date.now()-wkStart)/60000),exercises:EX().map((ex,i)=>({name:ex.name,sets:sets[i]||[]}))};
  history.push(session);
  setSyncDot('syncing');
  await ghWrite();
  setSyncDot('ok');
  const totalSets=session.exercises.reduce((t,ex)=>t+ex.sets.length,0);
  const totalVol=Math.round(vol(session));
  const exCards=session.exercises.filter(ex=>ex.sets.length>0).map(ex=>`<div class="ex-card"><div class="ex-card-name">${ex.name}</div><div class="ex-card-sets">${ex.sets.map(s=>`<div class="set-chip"><div class="bc" style="font-size:17px;font-weight:700">${fmt(s.w)}kg</div><div style="font-size:10px;color:#444">${s.r}r</div></div>`).join('')}</div></div>`).join('');
  document.getElementById('complete').innerHTML=`<div class="complete-wrap"><div class="bc complete-title" style="color:${c}">DONE!</div><div class="complete-sub">${session.duration} min · ${totalSets} sets · Saved to GitHub ✓</div><div class="complete-vol" style="border-left:3px solid ${c}">Volume: <span style="color:${c}">${totalVol.toLocaleString()}kg</span></div>${exCards}<button class="btn-home bc" style="background:${c}" onclick="renderHome();show('home')">BACK TO HOME</button></div>`;
  show('complete');
}

// ── HISTORY ──────────────────────────────────────────────────
function renderHistory(){
  const items=[...history].reverse().map(sess=>{
    const d=P(sess.day);
    const date=new Date(sess.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
    const totalSets=sess.exercises.reduce((t,ex)=>t+(ex.sets||[]).length,0);
    const totalVol=Math.round(vol(sess));
    const exList=sess.exercises.filter(ex=>(ex.sets||[]).length>0).map(ex=>{const mw=Math.max(...ex.sets.map(s=>s.w));return `<div class="hist-ex"><span class="hist-ex-name">${ex.name}</span><span class="bc hist-ex-stat">${fmt(mw)}kg · ${ex.sets.length}s</span></div>`;}).join('');
    return `<div class="hist-sess" style="background:#0f0f0f;border-color:${d.color}18;border-left-color:${d.color}"><div class="hist-top"><div><div class="bc" style="font-size:11px;color:${d.color};letter-spacing:2px;font-weight:700">${d.label}</div><div class="bc" style="font-size:17px;font-weight:900">${sess.dayName}</div></div><div style="text-align:right"><div style="font-size:12px;color:#666">${date}</div><div style="font-size:11px;color:#333">${sess.duration}min · ${totalSets} sets</div></div></div>${exList}<div class="hist-vol">Volume: ${totalVol.toLocaleString()}kg</div></div>`;
  }).join('');
  document.getElementById('history').innerHTML=`
    <div class="sticky hist-hdr">
      <div class="bc hist-title">HISTORY</div>
      <div style="display:flex;gap:8px">
        <button class="btn-hist-home" style="background:#0f0f0f" onclick="exportData()">📥 EXPORT</button>
        <button class="btn-hist-home" onclick="renderHome();show('home')">← HOME</button>
      </div>
    </div>
    <div class="hist-list">${items}</div>`;
}

// ── SETTINGS (reuse history div) ─────────────────────────────
function renderSettings(){
  const tok=ghToken?ghToken.substring(0,20)+'...':'Not connected';
  document.getElementById('history').innerHTML=`
    <div class="sticky hist-hdr">
      <div class="bc hist-title">SETTINGS</div>
      <button class="btn-hist-home" onclick="renderHome();show('home')">← HOME</button>
    </div>
    <div style="padding:16px">
      <div style="background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:16px;margin-bottom:12px">
        <div style="font-size:10px;color:#555;letter-spacing:2px;margin-bottom:10px">GITHUB SYNC</div>
        <div style="font-size:12px;color:#444;margin-bottom:12px">Token: ${tok}</div>
        <label class="setup-label">UPDATE TOKEN</label>
        <input type="password" id="newToken" placeholder="github_pat_..." style="margin-bottom:10px">
        <button onclick="updateToken()" style="width:100%;padding:11px;border:none;background:#FF4500;color:#000;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px">UPDATE</button>
      </div>
      <button onclick="exportData()" style="width:100%;padding:13px;background:#0f0f0f;border:1px solid #1a1a1a;color:#444;border-radius:8px;font-size:13px;letter-spacing:2px;font-family:'Barlow Condensed',sans-serif;margin-bottom:8px">📥 EXPORT ALL DATA</button>
      <button onclick="if(confirm('Force re-sync from GitHub?'))initApp()" style="width:100%;padding:13px;background:#0f0f0f;border:1px solid #1a1a1a;color:#444;border-radius:8px;font-size:13px;letter-spacing:2px;font-family:'Barlow Condensed',sans-serif">🔄 FORCE SYNC</button>
    </div>`;
}
async function updateToken(){
  const t=document.getElementById('newToken').value.trim();
  if(!t)return;
  ghToken=t;
  const ok=await ghRead();
  if(ok){localStorage.setItem(TOKEN_KEY,t);renderHome();show('home');}
  else alert('Token invalid or cannot read repo.');
}

// ── EXPORT ───────────────────────────────────────────────────
function exportData(){
  const data={exported:new Date().toISOString(),sessions:history,count:history.length};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`sanctum-workouts-${new Date().toISOString().split('T')[0]}.json`;
  a.click();URL.revokeObjectURL(url);
}

// ── TIMER ────────────────────────────────────────────────────
function startTimer(){killTimer();timerEnd=Date.now()+restSecs*1000;const c=C();document.getElementById('timerBar').style.cssText=`display:block;background:${c};width:100%`;document.getElementById('timerBanner').style.cssText=`display:flex;background:${c}dd`;document.getElementById('timerMsg').textContent='Rest...';timerInterval=setInterval(()=>{const left=Math.max(0,Math.ceil((timerEnd-Date.now())/1000));document.getElementById('timerSecs').textContent=left+'s';document.getElementById('timerBar').style.width=(left/restSecs*100)+'%';if(left<=0)killTimer();},100);}
function killTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}document.getElementById('timerBar').style.display='none';document.getElementById('timerBanner').style.display='none';}

// ── INIT ─────────────────────────────────────────────────────
async function initApp(){
  ghToken=localStorage.getItem(TOKEN_KEY)||null;
  if(ghToken){
    history=[...SEED.map(s=>JSON.parse(JSON.stringify(s)))];
    const ok=await ghRead();
    if(ok){renderHome();show('home');}
    else{history=[...SEED.map(s=>JSON.parse(JSON.stringify(s)))];renderHome();show('home');}
  } else {
    renderSetup();
  }
}
initApp();
</script>
</body>
